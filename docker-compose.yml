  # --- Engine 5: DeepSeek-OCR-2 ---
  ocr-deepseek-ocr-2:
    <<: *vllm-base
    container_name: ocr-engine-deepseek-ocr-2
    command: ["./deepseek-ocr-2/serve.sh"]
    environment:
      - GENAI_HOST=0.0.0.0
      - GENAI_PORT=8122
      - GENAI_MODEL=deepseek-ai/DeepSeek-OCR-2
      - CUDA_VISIBLE_DEVICES=1
    volumes:
      - hf_cache:/root/.cache/huggingface
      - ./ocr-engines/deepseek-ocr-2:/app/deepseek-ocr-2
      - ./deepseek-ocr-2-demo-2026:/app/deepseek-ocr-2-demo-2026

  # --- Engine 6: LightOnOCR-2-1B ---
  ocr-lighton-ocr-2-1b:
    <<: *vllm-base
    container_name: ocr-engine-lighton-ocr-2-1b
    command: ["./lighton-ocr-2-1b/serve.sh"]
    environment:
      - GENAI_HOST=0.0.0.0
      - GENAI_PORT=8123
      - GENAI_MODEL=lightonai/LightOnOCR-2-1B
      - CUDA_VISIBLE_DEVICES=1
    volumes:
      - hf_cache:/root/.cache/huggingface
      - ./ocr-engines/lighton-ocr-2-1b:/app/lighton-ocr-2-1b
      - ./LightOnOCR-2-1B-Demo-2026:/app/LightOnOCR-2-1B-Demo-2026

  # --- Engine 7: Dots.OCR ---
  ocr-dotsocr-vllm-server:
    image: vllm/vllm-openai:v0.11.0
    container_name: ocr-arena-dotsocr-vllm-server
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - HF_TOKEN
    volumes:
      - hf_cache:/root/.cache/huggingface
    ports:
      - "8008:8000"
    restart: unless-stopped
    command: >
      --model rednote-hilab/dots.mocr
      --tensor-parallel-size 1
      --gpu-memory-utilization 0.30
      --max-model-len 4096
      --chat-template-content-format string
      --served-model-name model
      --trust-remote-code

  ocr-dots-ocr:
    <<: *vllm-base
    container_name: ocr-engine-dots-ocr
    command: ["./dots-ocr/serve.sh"]
    environment:
      - GENAI_HOST=0.0.0.0
      - GENAI_PORT=8124
      - VLLM_SERVER_HOST=ocr-dotsocr-vllm-server
      - VLLM_SERVER_PORT=8000
      - CUDA_VISIBLE_DEVICES=0
    volumes:
      - hf_cache:/root/.cache/huggingface
      - ./ocr-engines/dots-ocr:/app/dots-ocr
      - ./dots.ocr-demo-2026:/app/dots.ocr-demo-2026
    depends_on:
      - ocr-dotsocr-vllm-server

  # --- Engine 8: GLM-OCR ---
  ocr-glm-ocr:
    <<: *vllm-base
    container_name: ocr-engine-glm-ocr
    command: ["./glm-ocr/serve.sh"]
    environment:
      - GENAI_HOST=0.0.0.0
      - GENAI_PORT=8125
      - GENAI_MODEL=zai-org/GLM-OCR
      - CUDA_VISIBLE_DEVICES=0
    volumes:
      - hf_cache:/root/.cache/huggingface
      - ./ocr-engines/glm-ocr:/app/glm-ocr
      - ./glm-ocr-demo-2026:/app/glm-ocr-demo-2026

  # --- Engine 9: Chandra OCR 2 ---
  ocr-chandra:
    <<: *vllm-base
    container_name: ocr-engine-chandra
    command: ["./chandra-ocr-2/serve.sh"]
    environment:
      - GENAI_HOST=0.0.0.0
      - GENAI_PORT=8126
    volumes:
      - hf_cache:/root/.cache/huggingface
      - ./ocr-engines/chandra-ocr-2:/app/chandra-ocr-2

  # --- Engine 10: Gemma 4 ---
  ocr-gemma4:
    <<: *vllm-base
    container_name: ocr-engine-gemma4
    command: ["./gemma-4/serve.sh"]
    environment:
