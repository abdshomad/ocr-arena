version: '3.8'

# Common Templates & YAML Anchors
x-vllm-build: &vllm-build
  context: ./ocr-engines
  target: vllm-server

x-pipeline-build: &pipeline-build
  context: ./ocr-engines
  target: pipeline-api

x-gpu-deploy: &gpu-deploy
  resources:
    reservations:
      devices:
        - driver: nvidia
          count: all
          capabilities: [gpu]

x-vllm-base: &vllm-base
  build: *vllm-build
  deploy: *gpu-deploy
  restart: unless-stopped

x-pipeline-base: &pipeline-base
  build: *pipeline-build
  deploy: *gpu-deploy
  restart: unless-stopped
  volumes:
    - paddle_cache:/root/.paddleocr
    - paddlex_cache:/root/.paddlex

services:
  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: ocr-arena-nginx
    ports:
      - "${PORT:-7890}:7890"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web-app
    restart: unless-stopped

  # OCR Arena Frontend Web App
  web-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ocr-arena-web-app
    env_file:
      - .secrets
    environment:
      - NODE_ENV=production
      - PGHOST=db
      - PGPORT=5432
      - PGDATABASE=ocrarena
      - PIPELINE_PADDLEOCR_URL=http://pipeline-paddleocr:8090/layout-parsing
      - PIPELINE_NEMOTRON_URL=http://pipeline-nemotron:8091/layout-parsing
      - PIPELINE_LLAMA3_VISION_URL=http://pipeline-llama3-vision:8092/layout-parsing
      - PIPELINE_DEEPSEEK_VL2_URL=http://ocr-deepseek-vl2:8121/layout-parsing
      - PIPELINE_DEEPSEEK_OCR_2_URL=http://ocr-deepseek-ocr-2:8122/layout-parsing
      - PIPELINE_LIGHTON_OCR_2_1B_URL=http://ocr-lighton-ocr-2-1b:8123/layout-parsing
      - PIPELINE_DOTS_OCR_URL=http://ocr-dots-ocr:8124/layout-parsing
      - PIPELINE_GLM_OCR_URL=http://ocr-glm-ocr:8125/layout-parsing
      - PIPELINE_CHANDRA_URL=http://ocr-chandra:8126/layout-parsing
      - PIPELINE_GEMMA4_URL=http://ocr-gemma4:8127/layout-parsing
      - PIPELINE_QWEN3VL_URL=http://ocr-qwen3vl:8128/layout-parsing
      - PIPELINE_LITPARSE_URL=http://ocr-engine-litparse:8129/layout-parsing
      - PIPELINE_MINERU_URL=http://ocr-mineru-diffusion:8130/layout-parsing
    depends_on:
      - db
      - pipeline-paddleocr
      - pipeline-nemotron
    restart: unless-stopped

  # Shared Database for History
  db:
    image: postgres:15-alpine
    container_name: ocr-arena-db
    env_file:
      - .secrets
    environment:
      - POSTGRES_DB=ocrarena
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  # --- Engine 1: PaddleOCR-VL-1.6 ---
  ocr-paddleocr:
    <<: *vllm-base
    container_name: ocr-engine-paddleocr
    command: ["./paddle-ocr-vl-1-6-v2/serve.sh"]
    environment:
      - GENAI_HOST=0.0.0.0
      - GENAI_PORT=8118
      - GENAI_MODEL=PaddleOCR-VL-1.6-0.9B
      - GENAI_BACKEND=vllm
      - CUDA_VISIBLE_DEVICES=0
      - PADDLE_PDX_DISABLE_MODEL_SOURCE_CHECK=True
      - VLLM_USE_V1=0
    volumes:
      - hf_cache:/root/.cache/huggingface
      - paddle_cache:/root/.paddleocr
      - paddlex_cache:/root/.paddlex
      - ./ocr-engines/paddle-ocr-vl-1-6-v2:/app/paddle-ocr-vl-1-6-v2

  pipeline-paddleocr:
    <<: *pipeline-base
    container_name: ocr-pipeline-paddleocr
    command: ["./paddle-ocr-vl-1-6-v2/serve-pipeline.sh"]
    environment:
      - PIPELINE_HOST=0.0.0.0
      - PIPELINE_PORT=8090
      - PIPELINE_DEVICE=gpu:0
      - CUDA_VISIBLE_DEVICES=0
      - VLLM_SERVER_URL=http://ocr-paddleocr:8118/v1
      - PADDLE_PDX_DISABLE_MODEL_SOURCE_CHECK=True
    depends_on:
      - ocr-paddleocr

  # --- Engine 2: NVIDIA Nemotron OCR v2 ---
  ocr-nemotron:
    <<: *vllm-base
    container_name: ocr-engine-nemotron
    command: ["./nvidia-nemotron-ocr-v2/serve.sh"]
    environment:
      - GENAI_HOST=0.0.0.0
      - GENAI_PORT=8119
      - GENAI_MODEL=nvidia/nemotron-ocr-v2
      - GENAI_BACKEND=custom
      - CUDA_VISIBLE_DEVICES=1
    volumes:
      - hf_cache:/root/.cache/huggingface
      - ./ocr-engines/nvidia-nemotron-ocr-v2:/app/nvidia-nemotron-ocr-v2

  pipeline-nemotron:
    <<: *pipeline-base
    container_name: ocr-pipeline-nemotron
    environment:
      - PIPELINE_HOST=0.0.0.0
      - PIPELINE_PORT=8091
      - PIPELINE_DEVICE=gpu:0
      - CUDA_VISIBLE_DEVICES=1
      - VLLM_SERVER_URL=http://ocr-nemotron:8119/v1
      - PADDLE_PDX_DISABLE_MODEL_SOURCE_CHECK=True
    depends_on:
      - ocr-nemotron

  # --- Engine 3: Llama-3.2-Vision ---
  ocr-llama3-vision:
    <<: *vllm-base
    container_name: ocr-engine-llama3-vision
    command: ["./llama3-vision/serve.sh"]
    environment:
      - GENAI_HOST=0.0.0.0
      - GENAI_PORT=8120
      - GENAI_MODEL=meta-llama/Llama-3.2-11B-Vision-Instruct
      - GENAI_BACKEND=vllm
      - CUDA_VISIBLE_DEVICES=0
      - HF_TOKEN
    volumes:
      - hf_cache:/root/.cache/huggingface
      - ./ocr-engines/llama3-vision:/app/llama3-vision

  pipeline-llama3-vision:
    <<: *pipeline-base
    container_name: ocr-pipeline-llama3-vision
    environment:
      - PIPELINE_HOST=0.0.0.0
      - PIPELINE_PORT=8092
      - PIPELINE_DEVICE=gpu:0
      - CUDA_VISIBLE_DEVICES=0
      - VLLM_SERVER_URL=http://ocr-llama3-vision:8120/v1
    depends_on:
      - ocr-llama3-vision

  # --- Engine 4: DeepSeek-VL2 ---
  ocr-deepseek-vl2:
    <<: *vllm-base
    container_name: ocr-engine-deepseek-vl2
    command: ["./deepseek-vl2/serve.sh"]
    environment:
      - GENAI_HOST=0.0.0.0
      - GENAI_PORT=8121
      - GENAI_MODEL=deepseek-ai/deepseek-vl2-tiny
      - GENAI_BACKEND=vllm
      - CUDA_VISIBLE_DEVICES=0
    volumes:
      - hf_cache:/root/.cache/huggingface
      - ./ocr-engines/deepseek-vl2:/app/deepseek-vl2

  pipeline-deepseek-vl2:
    <<: *pipeline-base
    container_name: ocr-pipeline-deepseek-vl2
    environment:
      - PIPELINE_HOST=0.0.0.0
      - PIPELINE_PORT=8093
      - PIPELINE_DEVICE=gpu:0
      - CUDA_VISIBLE_DEVICES=0
      - VLLM_SERVER_URL=http://ocr-deepseek-vl2:8121/v1
    depends_on:
      - ocr-deepseek-vl2

  # --- Engine 5: DeepSeek-OCR-2 ---
  ocr-deepseek-ocr-2:
    <<: *vllm-base
    container_name: ocr-engine-deepseek-ocr-2
    command: ["./deepseek-ocr-2/serve.sh"]
    environment:
      - GENAI_HOST=0.0.0.0
      - GENAI_PORT=8122
      - GENAI_MODEL=deepseek-ai/DeepSeek-OCR-2
      - CUDA_VISIBLE_DEVICES=1
    volumes:
      - hf_cache:/root/.cache/huggingface
      - ./ocr-engines/deepseek-ocr-2:/app/deepseek-ocr-2
      - ./deepseek-ocr-2-demo-2026:/app/deepseek-ocr-2-demo-2026

  # --- Engine 6: LightOnOCR-2-1B ---
  ocr-lighton-ocr-2-1b:
    <<: *vllm-base
    container_name: ocr-engine-lighton-ocr-2-1b
    command: ["./lighton-ocr-2-1b/serve.sh"]
    environment:
      - GENAI_HOST=0.0.0.0
      - GENAI_PORT=8123
      - GENAI_MODEL=lightonai/LightOnOCR-2-1B
      - CUDA_VISIBLE_DEVICES=1
    volumes:
      - hf_cache:/root/.cache/huggingface
      - ./ocr-engines/lighton-ocr-2-1b:/app/lighton-ocr-2-1b
      - ./LightOnOCR-2-1B-Demo-2026:/app/LightOnOCR-2-1B-Demo-2026

  # --- Engine 7: Dots.OCR ---
  ocr-dotsocr-vllm-server:
    image: vllm/vllm-openai:v0.11.0
    container_name: ocr-arena-dotsocr-vllm-server
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - HF_TOKEN
    volumes:
      - hf_cache:/root/.cache/huggingface
    ports:
      - "8008:8000"
    restart: unless-stopped
    command: >
      --model rednote-hilab/dots.mocr
      --tensor-parallel-size 1
      --gpu-memory-utilization 0.30
      --max-model-len 4096
      --chat-template-content-format string
      --served-model-name model
      --trust-remote-code

  ocr-dots-ocr:
    <<: *vllm-base
    container_name: ocr-engine-dots-ocr
    command: ["./dots-ocr/serve.sh"]
    environment:
      - GENAI_HOST=0.0.0.0
      - GENAI_PORT=8124
      - VLLM_SERVER_HOST=ocr-dotsocr-vllm-server
      - VLLM_SERVER_PORT=8000
      - CUDA_VISIBLE_DEVICES=0
    volumes:
      - hf_cache:/root/.cache/huggingface
      - ./ocr-engines/dots-ocr:/app/dots-ocr
      - ./dots.ocr-demo-2026:/app/dots.ocr-demo-2026
    depends_on:
      - ocr-dotsocr-vllm-server

  # --- Engine 8: GLM-OCR ---
  ocr-glm-ocr:
    <<: *vllm-base
    container_name: ocr-engine-glm-ocr
    command: ["./glm-ocr/serve.sh"]
    environment:
      - GENAI_HOST=0.0.0.0
      - GENAI_PORT=8125
      - GENAI_MODEL=zai-org/GLM-OCR
      - CUDA_VISIBLE_DEVICES=0
    volumes:
      - hf_cache:/root/.cache/huggingface
      - ./ocr-engines/glm-ocr:/app/glm-ocr
      - ./glm-ocr-demo-2026:/app/glm-ocr-demo-2026

  # --- Engine 9: Chandra OCR 2 ---
  ocr-chandra:
    <<: *vllm-base
    container_name: ocr-engine-chandra
    command: ["./chandra-ocr-2/serve.sh"]
    environment:
      - GENAI_HOST=0.0.0.0
      - GENAI_PORT=8126
    volumes:
      - hf_cache:/root/.cache/huggingface
      - ./ocr-engines/chandra-ocr-2:/app/chandra-ocr-2

  # --- Engine 10: Gemma 4 ---
  ocr-gemma4:
    <<: *vllm-base
    container_name: ocr-engine-gemma4
    command: ["./gemma-4/serve.sh"]
    environment:
      - GENAI_HOST=0.0.0.0
      - GENAI_PORT=8127
    volumes:
      - hf_cache:/root/.cache/huggingface
      - ./ocr-engines/gemma-4:/app/gemma-4

  # --- Engine 11: Qwen3-VL ---
  ocr-qwen3vl:
    <<: *vllm-base
    container_name: ocr-engine-qwen3vl
    command: ["./qwen3-vl/serve.sh"]
    environment:
      - GENAI_HOST=0.0.0.0
      - GENAI_PORT=8128
    volumes:
      - hf_cache:/root/.cache/huggingface
      - ./ocr-engines/qwen3-vl:/app/qwen3-vl

  # --- Engine 12: LiteParse ---
  ocr-engine-litparse:
    <<: *vllm-base
    container_name: ocr-engine-litparse
    command: ["./litparse/serve.sh"]
    environment:
      - GENAI_HOST=0.0.0.0
      - GENAI_PORT=8129
    volumes:
      - hf_cache:/root/.cache/huggingface
      - ./ocr-engines/litparse:/app/litparse

  # --- Engine 13: MinerU-Diffusion ---
  ocr-mineru-diffusion:
    <<: *vllm-base
    container_name: ocr-engine-mineru-diffusion
    command: ["./mineru-diffusion/serve.sh"]
    environment:
      - GENAI_HOST=0.0.0.0
      - GENAI_PORT=8130
    volumes:
      - hf_cache:/root/.cache/huggingface
      - ./ocr-engines/mineru-diffusion:/app/mineru-diffusion

volumes:
  hf_cache:
    name: ocr_arena_hf_cache
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ../../../.cache/huggingface
  paddle_cache:
    name: ocr_arena_paddle_cache
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ../../../.paddleocr
  paddlex_cache:
    name: ocr_arena_paddlex_cache
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ../../../.paddlex
  pgdata:
    name: ocr_arena_pgdata

