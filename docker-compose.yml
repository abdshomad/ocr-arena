version: '3.8'

# Common Templates & YAML Anchors
x-vllm-build: &vllm-build
  context: ./ocr-engines
  target: vllm-server

x-pipeline-build: &pipeline-build
  context: ./ocr-engines
  target: pipeline-api

x-gpu-deploy: &gpu-deploy
  resources:
    reservations:
      devices:
        - driver: nvidia
          count: all
          capabilities: [gpu]

x-vllm-base: &vllm-base
  build: *vllm-build
  deploy: *gpu-deploy
  restart: unless-stopped

x-pipeline-base: &pipeline-base
  build: *pipeline-build
  deploy: *gpu-deploy
  restart: unless-stopped
  volumes:
    - paddle_cache:/root/.paddleocr
    - paddlex_cache:/root/.paddlex

services:
  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: ocr-arena-nginx
    ports:
      - "${PORT:-7890}:7890"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web-app
    restart: unless-stopped

  # OCR Arena Frontend Web App
  web-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ocr-arena-web-app
    env_file:
      - .secrets
    environment:
      - NODE_ENV=production
      - PGHOST=db
      - PGPORT=5432
      - PGDATABASE=ocrarena
      - PIPELINE_PADDLEOCR_URL=http://pipeline-paddleocr:8090/layout-parsing
      - PIPELINE_NEMOTRON_URL=http://pipeline-nemotron:8091/layout-parsing
      - PIPELINE_LLAMA3_VISION_URL=http://pipeline-llama3-vision:8092/layout-parsing
      - PIPELINE_DEEPSEEK_VL2_URL=http://ocr-deepseek-vl2:8121/layout-parsing
      - PIPELINE_DEEPSEEK_OCR_2_URL=http://ocr-deepseek-ocr-2:8122/layout-parsing
      - PIPELINE_LIGHTON_OCR_2_1B_URL=http://ocr-lighton-ocr-2-1b:8123/layout-parsing
      - PIPELINE_DOTS_OCR_URL=http://ocr-dots-ocr:8124/layout-parsing
      - PIPELINE_GLM_OCR_URL=http://ocr-glm-ocr:8125/layout-parsing
      - PIPELINE_CHANDRA_URL=http://ocr-chandra:8126/layout-parsing
      - PIPELINE_GEMMA4_URL=http://ocr-gemma4:8127/layout-parsing
      - PIPELINE_QWEN3VL_URL=http://ocr-qwen3vl:8128/layout-parsing
      - PIPELINE_LITPARSE_URL=http://ocr-engine-litparse:8129/layout-parsing
      - PIPELINE_MINERU_URL=http://ocr-mineru-diffusion:8130/layout-parsing
      - PIPELINE_LIGHTONOCR_ORIGINAL_URL=http://ocr-lightonocr-original:8131/layout-parsing
      - PIPELINE_DOCOWL_URL=http://ocr-docowl:8132/layout-parsing
      - PIPELINE_PHI4_OCR_URL=http://ocr-phi4-ocr:8133/layout-parsing
      - PIPELINE_SMOL_DOCLING_URL=http://ocr-smol-docling:8134/layout-parsing
      - PIPELINE_GRANITE_DOCLING_URL=http://ocr-granite-docling:8135/layout-parsing
      - PIPELINE_AYA_VISION_URL=http://ocr-aya-vision:8136/layout-parsing
      - PIPELINE_DOLPHIN_URL=http://ocr-dolphin:8137/layout-parsing
      - PIPELINE_QWEN3_OMNI_URL=http://ocr-qwen3-omni:8138/layout-parsing
      - PIPELINE_OWLOCR_URL=http://ocr-owlocr:8139/layout-parsing
      - PIPELINE_OCR_FLUX_URL=http://ocr-ocr-flux:8140/layout-parsing
      - PIPELINE_MONKEY_OCR_URL=http://ocr-monkey-ocr:8141/layout-parsing
      - PIPELINE_NUMARKDOWN_URL=http://ocr-numarkdown:8142/layout-parsing
      - PIPELINE_OCR_DOCKER_URL=http://ocr-ocr-docker:8143/layout-parsing
      - PIPELINE_GEMMA3_URL=http://ocr-gemma3:8144/layout-parsing
      - PIPELINE_FALCON_OCR_URL=http://ocr-falcon-ocr:8145/layout-parsing
      - PIPELINE_DOLPHIN_V2_URL=http://ocr-dolphin-v2:8146/layout-parsing
      - PIPELINE_YOUTU_VL_URL=http://ocr-youtu-vl:8147/layout-parsing
      - PIPELINE_PIKE_PDF_URL=http://ocr-pike-pdf:8148/layout-parsing
      - PIPELINE_OPENPAGE_URL=http://ocr-openpage:8149/layout-parsing
      - PIPELINE_DOCUMAGNET_URL=http://ocr-documagnet:8150/layout-parsing
      - PIPELINE_HUNYUAN_OCR_URL=http://ocr-hunyuan-ocr:8151/layout-parsing
      - PIPELINE_COLPALI_URL=http://ocr-colpali:8152/layout-parsing
      - PIPELINE_PIXL_PASSPORT_URL=http://ocr-pixl-passport:8153/layout-parsing
      - PIPELINE_NEMOTRON_NANO_URL=http://ocr-nemotron-nano:8154/layout-parsing
      - PIPELINE_NEMOTRON_3_SUPER_URL=http://ocr-nemotron-3-super:8155/layout-parsing
      - PIPELINE_NEMOTRON_3_ULTRA_URL=http://ocr-nemotron-3-ultra:8156/layout-parsing
      - PIPELINE_NEMOTRON_OMNI_URL=http://ocr-nemotron-omni:8157/layout-parsing
      - PIPELINE_MINICPM_V_4_6_URL=http://ocr-minicpm-v-4-6:8158/layout-parsing
      - PIPELINE_DEEPSEEK_V4_URL=http://ocr-deepseek-v4:8159/layout-parsing
      - PIPELINE_PADDLE_VL_1_5_URL=http://ocr-paddle-vl-1-5:8160/layout-parsing
    depends_on:
      - db
      - pipeline-paddleocr
      - pipeline-nemotron
    restart: unless-stopped

  # Shared Database for History
  db:
    image: postgres:15-alpine
    container_name: ocr-arena-db
    env_file:
      - .secrets
    environment:
      - POSTGRES_DB=ocrarena
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  # --- Engine 1: PaddleOCR-VL-1.6 ---
  ocr-paddleocr:
    <<: *vllm-base
    container_name: ocr-engine-paddleocr
    command: ["./paddle-ocr-vl-1-6-v2/serve.sh"]
    environment:
      - GENAI_HOST=0.0.0.0
      - GENAI_PORT=8118
      - GENAI_MODEL=PaddleOCR-VL-1.6-0.9B
      - GENAI_BACKEND=vllm
      - CUDA_VISIBLE_DEVICES=0
      - PADDLE_PDX_DISABLE_MODEL_SOURCE_CHECK=True
      - VLLM_USE_V1=0
    volumes:
      - hf_cache:/root/.cache/huggingface
      - paddle_cache:/root/.paddleocr
      - paddlex_cache:/root/.paddlex
      - ./ocr-engines/paddle-ocr-vl-1-6-v2:/app/paddle-ocr-vl-1-6-v2

  pipeline-paddleocr:
    <<: *pipeline-base
    container_name: ocr-pipeline-paddleocr
    command: ["./paddle-ocr-vl-1-6-v2/serve-pipeline.sh"]
    environment:
      - PIPELINE_HOST=0.0.0.0
      - PIPELINE_PORT=8090
      - PIPELINE_DEVICE=gpu:0
      - CUDA_VISIBLE_DEVICES=0
      - VLLM_SERVER_URL=http://ocr-paddleocr:8118/v1
      - PADDLE_PDX_DISABLE_MODEL_SOURCE_CHECK=True
    depends_on:
      - ocr-paddleocr

  # --- Engine 2: NVIDIA Nemotron OCR v2 ---
  ocr-nemotron:
    <<: *vllm-base
    container_name: ocr-engine-nemotron
    command: ["./nvidia-nemotron-ocr-v2/serve.sh"]
    environment:
      - GENAI_HOST=0.0.0.0
      - GENAI_PORT=8119
      - GENAI_MODEL=nvidia/nemotron-ocr-v2
      - GENAI_BACKEND=custom
      - CUDA_VISIBLE_DEVICES=1
    volumes:
      - hf_cache:/root/.cache/huggingface
      - ./ocr-engines/nvidia-nemotron-ocr-v2:/app/nvidia-nemotron-ocr-v2

  pipeline-nemotron:
    <<: *pipeline-base
    container_name: ocr-pipeline-nemotron
    environment:
      - PIPELINE_HOST=0.0.0.0
      - PIPELINE_PORT=8091
      - PIPELINE_DEVICE=gpu:0
      - CUDA_VISIBLE_DEVICES=1
      - VLLM_SERVER_URL=http://ocr-nemotron:8119/v1
      - PADDLE_PDX_DISABLE_MODEL_SOURCE_CHECK=True
    depends_on:
      - ocr-nemotron

  # --- Engine 3: Llama-3.2-Vision ---
  ocr-llama3-vision:
    <<: *vllm-base
    container_name: ocr-engine-llama3-vision
    command: ["./llama3-vision/serve.sh"]
    environment:
      - GENAI_HOST=0.0.0.0
      - GENAI_PORT=8120
      - GENAI_MODEL=meta-llama/Llama-3.2-11B-Vision-Instruct
      - GENAI_BACKEND=vllm
      - CUDA_VISIBLE_DEVICES=0
      - HF_TOKEN
    volumes:
      - hf_cache:/root/.cache/huggingface
      - ./ocr-engines/llama3-vision:/app/llama3-vision

  pipeline-llama3-vision:
    <<: *pipeline-base
    container_name: ocr-pipeline-llama3-vision
    environment:
      - PIPELINE_HOST=0.0.0.0
      - PIPELINE_PORT=8092
      - PIPELINE_DEVICE=gpu:0
      - CUDA_VISIBLE_DEVICES=0
      - VLLM_SERVER_URL=http://ocr-llama3-vision:8120/v1
    depends_on:
      - ocr-llama3-vision

  # --- Engine 4: DeepSeek-VL2 ---
  ocr-deepseek-vl2:
    <<: *vllm-base
    container_name: ocr-engine-deepseek-vl2
    command: ["./deepseek-vl2/serve.sh"]
    environment:
      - GENAI_HOST=0.0.0.0
      - GENAI_PORT=8121
      - GENAI_MODEL=deepseek-ai/deepseek-vl2-tiny
      - GENAI_BACKEND=vllm
      - CUDA_VISIBLE_DEVICES=0
    volumes:
      - hf_cache:/root/.cache/huggingface
      - ./ocr-engines/deepseek-vl2:/app/deepseek-vl2

  pipeline-deepseek-vl2:
    <<: *pipeline-base
    container_name: ocr-pipeline-deepseek-vl2
    environment:
      - PIPELINE_HOST=0.0.0.0
      - PIPELINE_PORT=8093
      - PIPELINE_DEVICE=gpu:0
      - CUDA_VISIBLE_DEVICES=0
      - VLLM_SERVER_URL=http://ocr-deepseek-vl2:8121/v1
    depends_on:
